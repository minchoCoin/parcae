name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Copy shared files into package directory
        run: |
          cp README.md parcae_lm/README.md
          cp LICENSE parcae_lm/LICENSE

      - name: Build package
        working-directory: parcae_lm
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: parcae_lm/dist/
